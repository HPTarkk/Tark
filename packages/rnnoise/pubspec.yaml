name: rnnoise
description: Dart FFI binding to RNNoise (Xiph.Org), a recurrent-network real-time
  speech denoiser, vendored and built as a native library per platform.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.wearemobilefirst.rnnoise
        pluginClass: RnnoisePlugin
        ffiPlugin: true
      ios:
        pluginClass: RnnoisePlugin
        ffiPlugin: true
